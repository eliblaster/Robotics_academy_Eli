# Docker Compose for ROS2 Humble + Gazebo Harmonic
# LINUX VERSION - Native X11 support

services:
  ros2-gazebo:
    build:
      context: .
      dockerfile: Dockerfile
    image: ros2-humble-gazebo-harmonic:linux
    container_name: ros2_course_container
    
    # Interactive terminal
    stdin_open: true
    tty: true
    
    # Network configuration - host mode for ROS2 DDS
    network_mode: host
    
    # Environment variables
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - GZ_SIM_RESOURCE_PATH=/home/ros2user/ros2_ws/src
    
    # Volume mounts
    volumes:
      # Mount workspace for persistent code storage
      - ./ros2_ws:/home/ros2user/ros2_ws:rw
      # Course examples mounted read-write to allow editing/building in-place
      - ../examples:/home/ros2user/ros2_ws/examples:rw
      - ../tutorials:/home/ros2user/ros2_ws/tutorials:ro
      # X11 socket for GUI
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # X11 authentication
      - ${HOME}/.Xauthority:/home/ros2user/.Xauthority:ro
    
    # For hardware access (joysticks, cameras, etc.)
    privileged: false
    
    # Device access
    devices:
      - /dev/dri:/dev/dri  # GPU access for hardware acceleration

